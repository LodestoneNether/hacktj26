<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSINT AI Investigator</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>OSINT AI Investigator — Web MVP</h1>
      <p>Create a case with usernames, emails, and optional image evidence.</p>

      <section class="card">
        <h2>New Investigation Case</h2>
        <form id="case-form">
          <label>Case title<input name="title" required /></label>
          <label>Notes<textarea name="notes"></textarea></label>
          <label>Usernames (comma-separated)<input name="usernames" placeholder="alice,bob" /></label>
          <label>Emails (comma-separated)<input name="emails" placeholder="alice@example.com" /></label>
          <label>Image evidence<input type="file" name="image" accept="image/*" /></label>
          <button type="submit">Create Case</button>
        </form>
        <p id="create-status"></p>
      </section>

      <section class="card">
        <h2>Existing Cases</h2>
        <ul>
          {% for case in cases %}
          <li><a href="/cases/{{ case.id }}">{{ case.title }}</a> <span class="muted">{{ case.created_at }}</span></li>
          {% else %}
          <li>No cases yet.</li>
          {% endfor %}
        </ul>
      </section>
    </main>
    <script src="/static/main.js"></script>
  </body>
</html>
